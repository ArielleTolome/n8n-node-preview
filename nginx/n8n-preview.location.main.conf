# N8N Node Preview — Static asset location block
# Place in: /etc/nginx-rc/extra.d/n8n-ai.location.main.n8n-preview.conf
# This goes at the server {} level (location.main pattern).

location /n8n-preview/ {
    alias /opt/n8n-preview/;
    expires 1m;
    add_header Cache-Control "public, no-transform";
    add_header X-N8N-Preview "2.0";
    add_header Access-Control-Allow-Origin "*";
}

# N8N Node Preview — sub_filter injection
# Place in: /etc/nginx-rc/extra.d/n8n-ai.location.root.n8n-preview.conf
# This goes inside the location / {} block (location.root pattern).

sub_filter_once on;
sub_filter_types text/html;
proxy_set_header Accept-Encoding "";
sub_filter "</head>" "<script src=\"/n8n-preview/injector.js?v=2.0.0\"></script></head>";
